name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        run: |
          SUPABASE_URL="https://ledqshysnrdmnuiikujt.supabase.co"
          SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZHFzaHlzbnJkbW51aWlrdWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTk2NzMsImV4cCI6MjA5ODI3NTY3M30.XE0I_ZOIiRlCVLrkE_2mWnJeMzECxzuAlBMbVULfuWM"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/auth/v1/health")

          echo "Supabase health HTTP code: ${HTTP_CODE}"
          test "${HTTP_CODE}" = "200"
