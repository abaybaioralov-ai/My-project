name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        run: |
          SUPABASE_URL="https://hddgjrahppxnixhrrjke.supabase.co"
          SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZGdqcmFocHB4bml4aHJyamtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3ODkxMTksImV4cCI6MjA5ODM2NTExOX0.fNd1ftp_JJsF5RqNngAD-xkTlVN7Eu_rszKuaCyahzY"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/auth/v1/health")

          echo "Supabase health HTTP code: ${HTTP_CODE}"
          test "${HTTP_CODE}" = "200"
