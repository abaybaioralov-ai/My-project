<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI World Cup Predictor QR</title>
    <style>
      :root {
        color: #17262c;
        background: #eef2f4;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        padding: 24px;
        border: 1px solid #d9e1e5;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(21, 38, 45, 0.1);
        text-align: center;
      }

      img {
        width: min(360px, 100%);
        height: auto;
        border: 1px solid #d9e1e5;
        border-radius: 8px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #65737a;
        font-size: 14px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 14px;
        color: #256f86;
        font-weight: 800;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/game-qr.png" alt="QR code for AI World Cup Predictor 2026" />
      <h1>AI World Cup Predictor 2026</h1>
      <p>Scan to open the game and match predictor.</p>
      <a href="https://my-project-virid-five-tovv087g9e.vercel.app/">
        my-project-virid-five-tovv087g9e.vercel.app
      </a>
    </main>
  </body>
</html>
