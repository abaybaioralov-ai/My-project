<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScoreAI Themes</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f3f7fa;
        --ink: #101418;
        --muted: #56636d;
        --line: #d7e0e6;
        --surface: #ffffff;
        --blue: #1d71b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 14% 18%, rgba(29, 113, 184, 0.18), transparent 30%),
          linear-gradient(135deg, #f8fbfd 0%, var(--bg) 48%, #dfeaf0 100%);
        color: var(--ink);
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #000000;
        --ink: #ffffff;
        --muted: #c2c8ce;
        --line: #3c3c3c;
        --surface: #171717;
        background:
          radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.1), transparent 30%),
          linear-gradient(135deg, #000000 0%, #101010 52%, #252525 100%);
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      }

      body[data-theme="lamborghini"] {
        color-scheme: dark;
        --bg: #000000;
        --ink: #ffffff;
        --muted: #969696;
        --line: #313131;
        --surface: #181818;
        --blue: #ffc000;
        background: #000000;
        font-family: "Arial Narrow", "Arial Black", Impact, Arial, sans-serif;
      }

      body[data-theme="bugatti"] {
        color-scheme: dark;
        --bg: #000000;
        --ink: #ffffff;
        --muted: #999999;
        --line: #262626;
        --surface: #0d0d0d;
        --blue: #ffffff;
        background: #000000;
        font-family: Georgia, "Times New Roman", serif;
      }

      body[data-theme="bmw-m"] {
        color-scheme: light;
        --bg: #f4f7fa;
        --ink: #17212b;
        --muted: #6f7a83;
        --line: #d9e2e8;
        --surface: #ffffff;
        --blue: #1c69d4;
        background:
          linear-gradient(90deg, rgba(0, 102, 177, 0.12), transparent 26%),
          linear-gradient(180deg, #ffffff 0%, #eef3f7 100%);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1080px, calc(100% - 36px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .brand,
      .back-link,
      .theme-card {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
      }

      body[data-theme="light"] .brand,
      body[data-theme="light"] .back-link,
      body:not([data-theme]) .brand,
      body:not([data-theme]) .back-link {
        border-color: #8fa0ad;
        background: #ffffff;
        color: #101418;
        box-shadow: 0 10px 24px rgba(16, 20, 24, 0.12);
      }

      body[data-theme="light"] .theme-card,
      body:not([data-theme]) .theme-card {
        border-color: #9aabb7;
        background: #ffffff;
        box-shadow: 0 18px 44px rgba(16, 20, 24, 0.14);
      }

      body[data-theme="dark"] .brand,
      body[data-theme="dark"] .back-link,
      body[data-theme="dark"] .theme-card,
      body[data-theme="lamborghini"] .brand,
      body[data-theme="lamborghini"] .back-link,
      body[data-theme="lamborghini"] .theme-card,
      body[data-theme="bugatti"] .brand,
      body[data-theme="bugatti"] .back-link,
      body[data-theme="bugatti"] .theme-card {
        background: rgba(23, 23, 23, 0.78);
      }

      body[data-theme="bmw-m"] .brand,
      body[data-theme="bmw-m"] .back-link,
      body[data-theme="bmw-m"] .theme-card {
        background: rgba(255, 255, 255, 0.82);
      }

      body[data-theme="lamborghini"] .brand,
      body[data-theme="lamborghini"] .back-link,
      body[data-theme="lamborghini"] .theme-card,
      body[data-theme="bugatti"] .theme-card {
        border-radius: 0;
      }

      body[data-theme="bugatti"] .brand,
      body[data-theme="bugatti"] .back-link {
        font-family: "Courier New", ui-monospace, SFMono-Regular, Consolas, monospace;
        letter-spacing: 4px;
      }

      body[data-theme="lamborghini"] h1,
      body[data-theme="lamborghini"] .theme-card strong {
        font-family: Impact, "Arial Black", "Arial Narrow", Arial, sans-serif;
        font-weight: 400;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      body[data-theme="bugatti"] h1,
      body[data-theme="bugatti"] .theme-card strong {
        font-family: "Times New Roman", Georgia, serif;
        font-weight: 400;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      body[data-theme="bugatti"] .theme-card span,
      body[data-theme="bugatti"] .theme-card small,
      body[data-theme="bugatti"] .eyebrow {
        font-family: "Courier New", ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .brand,
      .back-link {
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .nav-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .hero {
        padding: 92px 0 38px;
      }

      .eyebrow {
        width: fit-content;
        margin: 0 0 18px;
        padding: 8px 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(42px, 8vw, 86px);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .hero p:last-child {
        max-width: 620px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .theme-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 16px;
      }

      .theme-card {
        position: relative;
        overflow: hidden;
        min-height: 260px;
        padding: 22px;
        border-radius: 10px;
        cursor: pointer;
        color: var(--ink);
        text-align: left;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .theme-card::before,
      .theme-card::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .theme-card > * {
        position: relative;
        z-index: 1;
      }

      .theme-card:hover {
        transform: translateY(-3px);
      }

      .theme-card.is-active {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(29, 113, 184, 0.18);
      }

      body[data-theme="light"] .theme-card.is-active,
      body:not([data-theme]) .theme-card.is-active {
        border-color: #1d71b8;
        box-shadow:
          0 0 0 4px rgba(29, 113, 184, 0.22),
          0 20px 48px rgba(16, 20, 24, 0.18);
      }

      body[data-theme="lamborghini"] .theme-card.is-active {
        box-shadow: 0 0 0 4px rgba(255, 192, 0, 0.22);
      }

      body[data-theme="bugatti"] .theme-card.is-active {
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.16);
      }

      body[data-theme="bmw-m"] .theme-card.is-active {
        box-shadow: 0 0 0 4px rgba(28, 105, 212, 0.18);
      }

      .theme-card span,
      .theme-card small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .theme-card strong {
        display: block;
        margin: 106px 0 10px;
        font-size: 31px;
        line-height: 1;
      }

      .light-preview {
        background: linear-gradient(135deg, #ffffff 0%, #eef5f8 55%, #dce9ef 100%);
        color: #101418;
      }

      .light-preview::before {
        inset: 16px 16px auto auto;
        width: 86px;
        height: 86px;
        border: 1px solid rgba(29, 113, 184, 0.22);
        border-radius: 999px;
      }

      .light-preview::after {
        inset: auto 0 0 0;
        height: 7px;
        background: linear-gradient(90deg, #dfe8ee, #ffffff, #b9c9d4);
      }

      .dark-preview {
        background: linear-gradient(135deg, #000000 0%, #171717 58%, #303030 100%);
        color: #ffffff;
      }

      .dark-preview::before {
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 34px 34px;
        opacity: 0.55;
      }

      .dark-preview::after {
        right: 20px;
        bottom: 20px;
        width: 62px;
        height: 62px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 999px;
      }

      .dark-preview span,
      .dark-preview small {
        color: #c7ccd1;
      }

      .bmw-preview {
        background:
          linear-gradient(90deg, #0066b1 0 22%, #1c69d4 22% 44%, #e22718 44% 66%, transparent 66%),
          linear-gradient(135deg, #ffffff 0%, #eef4f8 58%, #dde7ee 100%);
        color: #17212b;
      }

      .bmw-preview::before {
        top: -18px;
        right: 22px;
        width: 96px;
        height: 280px;
        transform: skewX(-18deg);
        background:
          linear-gradient(90deg, #0066b1 0 31%, #1c69d4 31% 62%, #e22718 62% 100%);
        opacity: 0.95;
      }

      .bmw-preview::after {
        left: 0;
        bottom: 0;
        width: 100%;
        height: 10px;
        background:
          linear-gradient(90deg, #0066b1 0 33%, #1c69d4 33% 66%, #e22718 66% 100%);
      }

      .bmw-preview strong {
        color: #1c69d4;
      }

      .lamborghini-preview {
        border-radius: 0;
        border-color: #ffc000;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.86) 0 62%, rgba(174, 126, 0, 0.96) 62% 100%),
          linear-gradient(135deg, #000000 0%, #111111 48%, #202020 100%);
        color: #ffffff;
      }

      .lamborghini-preview::before {
        top: -38px;
        right: 58px;
        width: 34px;
        height: 320px;
        transform: rotate(20deg);
        background: #8f6800;
        box-shadow:
          22px 0 0 #000000,
          34px 0 0 rgba(255, 228, 92, 0.7);
        opacity: 1;
      }

      .lamborghini-preview::after {
        right: 34px;
        bottom: 28px;
        width: 94px;
        height: 82px;
        clip-path: polygon(50% 0, 100% 24%, 100% 76%, 50% 100%, 0 76%, 0 24%);
        background:
          linear-gradient(135deg, transparent 42%, rgba(0, 0, 0, 0.62) 42% 58%, transparent 58%),
          rgba(0, 0, 0, 0.9);
        outline: 2px solid #ffc000;
      }

      .lamborghini-preview strong {
        max-width: 120px;
        padding: 0;
        background: transparent;
        color: #ffe45c;
      }

      .lamborghini-preview span,
      .lamborghini-preview small {
        max-width: 142px;
        padding: 3px 5px;
        background: rgba(0, 0, 0, 0.78);
        color: #f5f5f5;
      }

      .bugatti-preview {
        border-radius: 0;
        background: linear-gradient(135deg, #000000 0%, #0d0d0d 55%, #141414 100%);
        color: #ffffff;
      }

      .bugatti-preview::before {
        inset: 18px;
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .bugatti-preview::after {
        top: 28px;
        right: 24px;
        width: 92px;
        height: 1px;
        background: #ffffff;
        box-shadow:
          0 18px 0 rgba(255, 255, 255, 0.62),
          0 36px 0 rgba(255, 255, 255, 0.32);
      }

      .bugatti-preview strong {
        max-width: 100%;
        font-size: clamp(18px, 1.55vw, 21px);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .bugatti-preview span,
      .bugatti-preview small {
        color: #cccccc;
        letter-spacing: 2px;
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 28px, 1080px);
        }

        .topbar,
        .theme-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .nav-actions {
          justify-content: flex-start;
        }

        .theme-grid {
          display: grid;
        }

        .hero {
          padding-top: 64px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="topbar" aria-label="Theme navigation">
        <a class="brand" href="/">ScoreAI Themes</a>
        <div class="nav-actions">
          <a class="back-link" href="/profile.html">Profile</a>
          <a class="back-link" href="/">Back to main site</a>
        </div>
      </nav>

      <section class="hero">
        <p class="eyebrow">Theme control</p>
        <h1>Choose the look for your predictions.</h1>
        <p>Pick a clean light view, a pure dark view, BMW-M motorsport, Lamborghini black and gold, or Bugatti monochrome. The main site will remember your choice.</p>
      </section>

      <section class="theme-grid" aria-label="Theme choices">
        <button class="theme-card light-preview" data-theme-choice="light" type="button">
          <span>Light theme</span>
          <strong>Clean studio</strong>
          <small>Bright panels, clear match cards, softer page background.</small>
        </button>
        <button class="theme-card dark-preview" data-theme-choice="dark" type="button">
          <span>Dark theme</span>
          <strong>Night stadium</strong>
          <small>Black background, high contrast scores, focused match view.</small>
        </button>
        <button class="theme-card bmw-preview" data-theme-choice="bmw-m" type="button">
          <span>BMW-M theme</span>
          <strong>Motorsport</strong>
          <small>White cockpit, M stripes, blue and red performance accents.</small>
        </button>
        <button class="theme-card lamborghini-preview" data-theme-choice="lamborghini" type="button">
          <span>Lamborghini theme</span>
          <strong>Black gold</strong>
          <small>Pure black surfaces, sharp panels, gold match accents.</small>
        </button>
        <button class="theme-card bugatti-preview" data-theme-choice="bugatti" type="button">
          <span>Bugatti theme</span>
          <strong>Monochrome</strong>
          <small>Quiet black canvas, white type, thin luxury lines.</small>
        </button>
      </section>

    </main>

    <script>
      const cards = document.querySelectorAll('[data-theme-choice]');

      function setTheme(theme) {
        document.body.dataset.theme = theme;
        localStorage.setItem('theme-mode', theme);
        cards.forEach((card) => {
          card.classList.toggle('is-active', card.dataset.themeChoice === theme);
        });
      }

      cards.forEach((card) => {
        card.addEventListener('click', () => setTheme(card.dataset.themeChoice));
      });

      const savedTheme = localStorage.getItem('theme-mode');
      setTheme(['light', 'dark', 'bmw-m', 'lamborghini', 'bugatti'].includes(savedTheme) ? savedTheme : 'light');
    </script>
  </body>
</html>
